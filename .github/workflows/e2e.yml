name: e2e

on:
  push:
    branches: [master, release/**]
  pull_request:

jobs:
  test:
    env:
      NODE: "20"
    name: Test contract.Client (${{ matrix.job }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        job: ["test:e2e"]
    services:
      rpc:
        image: stellar/quickstart:testing@sha256:e09b46445243c966557073e4947642153e515bb3fa0c8b26d92ed3b7cdce3ba2
        ports:
          - 8000:8000
        env:
          ENABLE_LOGS: true
          NETWORK: local
          ENABLE_SOROBAN_RPC: true
          PROTOCOL_VERSION: 25
        options: >-
          --health-cmd "curl --no-progress-meter --fail-with-body -X POST \"http://localhost:8000/soroban/rpc\" -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"id\":8675309,\"method\":\"getNetwork\"}' && curl --no-progress-meter \"http://localhost:8000/friendbot\" | grep '\"invalid_field\": \"addr\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 50
    steps:
    - name: Setup pnpm
        uses: pnpm/action-setup@v4
        
    - uses: actions/checkout@v4
      with:
        submodules: true
    - uses: actions/cache@v4
      with:
        path: |
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml
    - uses: stellar/stellar-cli@v23.4.0

    # Install system dependencies required for Stellar CLI
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libdbus-1-dev pkg-config

    - run: corepack enable
    - run: rustup target add wasm32v1-none
    - run: pnpm install --frozen-lockfile
    - run: pnpm exec playwright install
    - run: pnpm exec playwright install-deps
    - run: pnpm run build:prod
    - run: pnpm run ${{ matrix.job }}
